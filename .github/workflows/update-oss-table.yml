name: Update OSS Contribution Table

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  update-table:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query GitHub API for contributions
        uses: actions/github-script@v7
        id: query
        with:
          script: |
            // Merged PRs by EtanHey to external repos
            const externalPRs = await github.rest.search.issuesAndPullRequests({
              q: 'type:pr author:EtanHey is:merged -user:EtanHey',
              per_page: 50,
              sort: 'updated',
              order: 'desc'
            });

            // Open PRs by EtanHey to external repos
            const openPRs = await github.rest.search.issuesAndPullRequests({
              q: 'type:pr author:EtanHey is:open -user:EtanHey',
              per_page: 50,
              sort: 'updated',
              order: 'desc'
            });

            // Filter out team repos (WebyCreatorsTeam, Mehayom, Nola-Devs, Shmuelmb)
            const skipOrgs = ['WebyCreatorsTeam', 'Mehayom', 'Nola-Devs', 'Shmuelmb'];
            const filterPR = (pr) => {
              const repoUrl = pr.repository_url || '';
              return !skipOrgs.some(org => repoUrl.includes(org));
            };

            const merged = externalPRs.data.items.filter(filterPR).map(pr => ({
              number: pr.number,
              url: pr.pull_request.html_url,
              repo: pr.repository_url.split('/').slice(-2).join('/'),
              title: pr.title,
              status: 'Merged'
            }));

            const open = openPRs.data.items.filter(filterPR).map(pr => ({
              number: pr.number,
              url: pr.pull_request.html_url,
              repo: pr.repository_url.split('/').slice(-2).join('/'),
              title: pr.title,
              status: 'Open'
            }));

            const all = [...merged, ...open];
            core.setOutput('contributions', JSON.stringify(all));

      - name: Update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const contributions = JSON.parse('${{ steps.query.outputs.contributions }}');

            let readme = fs.readFileSync('README.md', 'utf8');

            // Build table
            let table = '| PR | Repo | Status | What |\n';
            table += '|----|------|--------|------|\n';
            for (const pr of contributions) {
              const shortTitle = pr.title.length > 60 ? pr.title.slice(0, 57) + '...' : pr.title;
              table += `| [#${pr.number}](${pr.url}) | ${pr.repo} | ${pr.status} | ${shortTitle} |\n`;
            }

            // Replace between markers
            const startMarker = '### Contributions to Other Projects';
            const endMarker = '---';
            const startIdx = readme.indexOf(startMarker);
            if (startIdx !== -1) {
              const afterStart = readme.indexOf('\n', startIdx) + 1;
              const endIdx = readme.indexOf(endMarker, afterStart);
              if (endIdx !== -1) {
                readme = readme.slice(0, afterStart) + '\n' + table + '\n' + readme.slice(endIdx);
              }
            }

            fs.writeFileSync('README.md', readme);

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: auto-update OSS contribution table [skip ci]"
          git push
